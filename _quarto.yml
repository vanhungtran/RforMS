project:
  type: book
  output-dir: docs

book:
  title: "Mass Spectrometry Data Analysis with R"
  subtitle: "A Comprehensive Guide to MS Data Analysis"
  author: "Lucas VHH TRAN"
  date: today
  cover-image: cover.png
  site-url: https://vanhungtran.github.io/RforMS/
  repo-url: https://github.com/vanhungtran/RforMS
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - part: "Part I — Foundations and Reproducible Setup"
      chapters:
        - 01-ms-introduction.qmd
        - 02-r-bioconductor.qmd
        - 03-reproducible-setup.qmd
    - part: "Part II — Data Import, Formats, and Quality Control"
      chapters:
        - 04-ms-file-formats.qmd
        - 05-importing-raw-data.qmd
        - 06-metadata-qc.qmd
    - part: "Part III — Spectral Processing and Feature Quantification"
      chapters:
        - 07-spectral-processing.qmd
        - 08-peak-detection.qmd
        - 09-retention-time-alignment.qmd
        - 10-spectral-library-search.qmd
    - part: "Part IV — Visualization, Preprocessing, and Statistics"
      chapters:
        - 11-visualization.qmd
        - 12-preprocessing-intensity.qmd
        - 13-statistical-testing.qmd
        - 14-multivariate-ml.qmd
    - part: "Part V — Proteomics Workflows"
      chapters:
        - 15-shotgun-proteomics.qmd
        - 16-quantitative-proteomics.qmd
        - 17-ptm-analysis.qmd
    - part: "Part VI — Metabolomics Workflows"
      chapters:
        - 18-untargeted-metabolomics.qmd
        - 19-metabolite-annotation.qmd
        - 20-targeted-metabolomics.qmd
    - part: "Part VII — Multi-Omics, Reporting, and Reproducible Delivery"
      chapters:
        - 21-multiomics-integration.qmd
        - 22-reproducible-reporting.qmd
    - summary.qmd
    - references.qmd

  appendices:
    - appendix-a-packages.qmd
    - appendix-b-formats.qmd
    - appendix-c-adducts.qmd
    - appendix-d-statistics.qmd

bibliography: references.bib

execute:
  warning: false
  message: false
  echo: false

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 3
    code-fold: true
    code-tools: false
    code-copy: false
    code-link: false
    link-external-newwindow: true
    link-external-icon: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    fig-width: 8
    fig-height: 6
    fig-dpi: 300
    prefer-html: true
    html-math-method: katex
    include-after-body: zoom-controls.html

editor: visual
