project:
  type: book
  output-dir: docs

book:
  title: "Mass Spectrometry Data Analysis with R"
  subtitle: "23 Hands-on Programs for Identification, Quantification, and Reproducible Analysis of Proteomics and Metabolomics Data"
  author: "Lucas VHH TRAN"
  date: today
  cover-image: cover.png
  site-url: https://vanhungtran.github.io/RforMS/
  repo-url: https://github.com/vanhungtran/RforMS
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - 02-what-is-ms.qmd

    - part: "Part I — Foundations: Reproducible MS Analysis in R"
      chapters:
        - 03-first-project.qmd
        - 04-import-data.qmd
        - 05-data-objects.qmd
        - 06-initial-qc.qmd

    - part: "Part II — Feature Detection and Identification"
      chapters:
        - 07-detect-features.qmd
        - 08-audit-psm.qmd
        - 09-protein-evidence.qmd
        - 10-annotate-metabolites.qmd
        - 11-library-search.qmd

    - part: "Part III — Quantification Workflows: From MS Signals to Abundance Matrices"
      chapters:
        - 12-quant-proteomics.qmd
        - 13-lfq-proteomics.qmd
        - 14-tmt-labeling.qmd
        - 15-targeted-quant.qmd
        - 16-metabolomics-pipelines.qmd

    - part: "Part IV — Data Cleaning and Preprocessing"
      chapters:
        - 17-normalize-batches.qmd
        - 18-missing-data.qmd

    - part: "Part V — Statistical Modeling"
      chapters:
        - 19-differential-abundance.qmd
        - 20-covariates-repeated.qmd
        - 21-biomarker-modeling.qmd

    - part: "Part VI — Biological Interpretation and Reproducible Reporting"
      chapters:
        - 22-pathway-network.qmd
        - 23-reproducible-reports.qmd

    - summary.qmd
    - references.qmd

  appendices:
    - appendix-a-packages.qmd
    - appendix-b-formats.qmd
    - appendix-c-adducts.qmd
    - appendix-d-statistics.qmd

bibliography: references.bib

execute:
  warning: false
  message: false
  echo: false

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 3
    code-fold: true
    code-tools: false
    code-copy: false
    code-link: false
    link-external-newwindow: true
    link-external-icon: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    fig-width: 8
    fig-height: 6
    fig-dpi: 300
    prefer-html: true
    html-math-method: katex
    include-after-body: zoom-controls.html

editor: visual
