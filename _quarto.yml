project:
  type: book
  output-dir: docs

book:
  title: "R for Mass Spectrometry"
  subtitle: "A Comprehensive Guide to MS Data Analysis"
  author: "Lucas VHH TRAN"
  date: today
  cover-image: cover.png
  site-url: https://vanhungtran.github.io/RforMS/
  repo-url: https://github.com/vanhungtran/RforMS
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - part: "Part I - Foundations"
      chapters:
        - 01-ms-principles.qmd
        - 02-r-fundamentals.qmd
    - part: "Part II - Data Infrastructure"
      chapters:
        - 03-open-ms-data.qmd
        - 04-data-formats-import.qmd
        - 05-advanced-topics.qmd
    - part: "Part III - Spectral Processing"
      chapters:
        - 06-spectral-preprocessing.qmd
        - 07-peak-detection-quantification.qmd
        - 08-spectral-library-search.qmd
    - part: "Part IV - Visualization & Statistics"
      chapters:
        - 09-data-visualization.qmd
        - 10-statistical-analysis.qmd
    - part: "Part V - Metabolomics"
      chapters:
        - 11-metabolomics-analysis.qmd
        - 12-metabolite-annotation.qmd
    - part: "Part VI - Proteomics"
      chapters:
        - 13-proteomics-analysis.qmd
        - 14-qfeatures-quantitative.qmd
        - 15-ptm-analysis.qmd
    - part: "Part VII - Advanced & Integration"
      chapters:
        - 16-multiomics-integration.qmd
        - 17-reproducible-workflows.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib

execute:
  warning: false
  message: false
  echo: false

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 3
    code-fold: true
    code-tools: false
    code-copy: false
    code-link: false
    link-external-newwindow: true
    link-external-icon: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    fig-width: 8
    fig-height: 6
    fig-dpi: 300
    prefer-html: true
    html-math-method: katex
    include-after-body: zoom-controls.html

editor: visual
