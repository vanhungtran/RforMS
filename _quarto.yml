project:
  type: book
  output-dir: docs

book:
  title: "Mass Spectrometry Data Analysis with R"
  subtitle: "A Practical Guide to Reproducible Proteomics and Metabolomics with Bioconductor"
  author: "Lucas VHH TRAN"
  date: today
  cover-image: cover.png
  site-url: https://vanhungtran.github.io/RforMS/
  repo-url: https://github.com/vanhungtran/RforMS
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - 02-what-is-ms.qmd

    - part: "Part I — Foundations: Reproducible MS Analysis in R"
      chapters:
        - 03-r-bioconductor.qmd
        - 04-reproducible-project.qmd
        - 05-import-data.qmd
        - 06-data-objects.qmd
        - 07-initial-qc.qmd

    - part: "Part II — Feature Detection and Identification"
      chapters:
        - 08-detect-features.qmd
        - 09-annotate-metabolites.qmd
        - 10-library-search.qmd
        - 11-audit-psm.qmd
        - 12-protein-evidence.qmd

    - part: "Part III — Quantification Workflows"
      chapters:
        - 13-quant-proteomics.qmd
        - 14-lfq-proteomics.qmd
        - 15-tmt-labeling.qmd
        - 16-targeted-quant.qmd
        - 17-metabolomics-pipelines.qmd

    - part: "Part IV — Normalization, Batch Correction, and Missing Data"
      chapters:
        - 18-normalize-batches.qmd
        - 19-missing-data.qmd

    - part: "Part V — Statistical Modeling and Machine Learning"
      chapters:
        - 20-experimental-design.qmd
        - 21-differential-abundance.qmd
        - 22-covariates-repeated.qmd
        - 23-machine-learning.qmd
        - 24-biomarker-modeling.qmd

    - part: "Part VI — Biological Interpretation and Reproducible Reporting"
      chapters:
        - 25-pathway-network.qmd
        - 26-reproducible-reports.qmd

    - part: "Part VII — Capstone: End-to-End Case Studies"
      chapters:
        - 27-capstone-case-studies.qmd

    - summary.qmd
    - references.qmd

  appendices:
    - appendix-a-packages.qmd
    - appendix-b-formats.qmd
    - appendix-c-adducts.qmd
    - appendix-d-statistics.qmd
    - appendix-e-single-cell-proteomics.qmd
    - appendix-f-ms-imaging.qmd

bibliography: references.bib

execute:
  warning: false
  message: false
  echo: true
  eval: true
  output: true

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 3
    code-fold: true
    code-tools: false
    code-copy: false
    code-link: false
    link-external-newwindow: true
    link-external-icon: true
    smooth-scroll: true
    citations-hover: true
    footnotes-hover: true
    fig-width: 8
    fig-height: 6
    fig-dpi: 300
    prefer-html: true
    html-math-method: katex
    include-after-body: zoom-controls.html

editor: visual
